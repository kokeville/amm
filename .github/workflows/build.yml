name: Build macOS App

on:
  push:
    branches: [ "master", "claude/add-timer-durations-HWDt6" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: macos-13
            arch: amd64
          - runner: macos-latest
            arch: arm64

    runs-on: ${{ matrix.runner }}
    name: Build (${{ matrix.arch }})

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build binary
        run: |
          CGO_ENABLED=1 GOOS=darwin GOARCH=${{ matrix.arch }} go build -o ./amm-${{ matrix.arch }} cmd/main.go

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: amm-${{ matrix.arch }}
          path: ./amm-${{ matrix.arch }}
          retention-days: 1

  package:
    needs: build
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          pattern: amm-*
          merge-multiple: true

      - name: Create universal binary and package .app
        run: |
          lipo -create -output ./amm-universal ./amm-amd64 ./amm-arm64
          mkdir -p ./bin/amm.app/Contents/Resources
          mkdir -p ./bin/amm.app/Contents/MacOS
          cp ./appInfo/Info.plist ./bin/amm.app/Contents/Info.plist
          cp ./appInfo/icon.icns ./bin/amm.app/Contents/Resources/icon.icns
          cp ./amm-universal ./bin/amm.app/Contents/MacOS/amm
          chmod +x ./bin/amm.app/Contents/MacOS/amm
          cd ./bin && zip -r amm.app.zip amm.app

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: amm-macos
          path: ./bin/amm.app.zip
          retention-days: 30
