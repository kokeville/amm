name: Build macOS App

on:
  push:
    branches: [ "master", "claude/add-timer-durations-HWDt6" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          check-latest: true

      - name: Build and package .app
        run: |
          mkdir -p ./bin/amm.app/Contents/Resources
          mkdir -p ./bin/amm.app/Contents/MacOS
          cp ./appInfo/Info.plist ./bin/amm.app/Contents/Info.plist
          cp ./appInfo/icon.icns ./bin/amm.app/Contents/Resources/icon.icns
          go build -o ./bin/amm.app/Contents/MacOS/amm cmd/main.go
          chmod +x ./bin/amm.app/Contents/MacOS/amm
          cd ./bin && zip -r amm.app.zip amm.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: amm-macos
          path: ./bin/amm.app.zip
          retention-days: 30
